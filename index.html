<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة مركز التحفيظ</title>
<style>
 body {
   font-family: sans-serif;
   background: #f0f0f0;
   direction: rtl;
   text-align: right;
 }
 header {
   background: #0f5132;
   color: white;
   padding: 1rem;
 }
 main {
   padding: 1rem;
 }
 section {
   margin-bottom: 2rem;
   background: #fff;
   border: 1px solid #ccc;
   padding: 1rem;
 }
 label, input, button {
   display: block;
   margin: 0.5rem 0;
 }
</style>
</head>
<body>
<header>
  <h1>نظام إدارة مركز تحفيظ القرآن الكريم</h1>
</header>
<main>
  <section id="login">
    <h2>تسجيل الدخول</h2>
    <form>
      <label for="role">اختر الدور:</label>
      <select id="role">
        <option value="admin">إدارة</option>
        <option value="teacher">معلم</option>
        <option value="parent">ولي أمر</option>
      </select>
      <label for="email">البريد الإلكتروني / الهاتف:</label>
      <input type="text" id="email">
      <label for="password">كلمة المرور:</label>
      <input type="password" id="password">
      <button type="button" onclick="login()">دخول</button>
    </form>
  </section>

  <section id="admin" style="display:none;">
    <h2>لوحة الإدارة</h2>
    <p>إدارة المعلمين والطلاب والجداول والتقارير.</p>
    <!-- المزيد من المكونات هنا -->
  </section>

  <section id="teacher" style="display:none;">
    <h2>لوحة المعلم</h2>
    <p>إدارة الطلاب والتقارير اليومية والحضور.</p>
  </section>

  <section id="parent" style="display:none;">
    <h2>لوحة ولي الأمر</h2>
    <p>عرض تقارير الأبناء المعتمدة والخطط والحضور.</p>
  </section>
</main>
<script>
function login() {
  const role = document.getElementById('role').value;
  document.getElementById('login').style.display = 'none';
  document.getElementById(role).style.display = 'block';
}
</script>
</body>
</html>
